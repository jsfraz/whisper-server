<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icon.svg">
    <title>Whisper server</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            width: 100%;
            overflow: hidden;

            background-color: #1377f0;
            background-image:
                radial-gradient(circle at 0% 100%, #834bf1 0%, transparent 55%),
                radial-gradient(circle at 0% 0%, #35a6f8 0%, transparent 50%),
                linear-gradient(135deg, #1e9af7 0%, #1377f0 50%, #0a43c3 100%);
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .logo {
            display: block;
            width: clamp(10rem, 62vmin, 28rem);
            height: auto;
            aspect-ratio: 1;
        }

        .eyelid-left {
            transform-box: fill-box;
            transform-origin: 50% 0%;
            transform: scaleY(0);
            animation: blink-left 1.1s cubic-bezier(0.4, 0, 0.2, 1) 0.45s 1 forwards;
        }

        @keyframes blink-left {
            0%, 58%, 100% {
                transform: scaleY(0);
                animation-timing-function: cubic-bezier(0.4, 0, 1, 1);
            }

            68% {
                transform: scaleY(1.04);
                animation-timing-function: cubic-bezier(0.2, 0, 0.4, 1);
            }

            82% {
                transform: scaleY(0);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .eyelid-left {
                animation: none;
                transform: scaleY(0);
            }
        }
    </style>
</head>

    <script>
        const redirectUrl = 'https://github.com/jsfraz/whisper';
        const eyelid = document.querySelector('.eyelid-left');

        function redirect() {
            window.location.replace(redirectUrl);
        }

        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            redirect();
        } else {
            eyelid.addEventListener('animationend', redirect, { once: true });
